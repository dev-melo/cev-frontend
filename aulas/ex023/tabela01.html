<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trampando com Tabela</title>
    <style>
        table {
            height: 300px;
            width: 300px;
            border-collapse: collapse;
        }

        
        td {
            border: 1px solid black;
            padding: 5px;
            text-align: left; /*Alinhamento Horizontal*/
            vertical-align: bottom; /*Alinhamento Vertical*/
        }

        .numero{
            text-align: right;
        }
    </style>
</head>

<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td class="numero">C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>

</html>
