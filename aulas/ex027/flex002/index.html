<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>

        *{
            font-family: 'Courier New', Courier, monospace;
        }
        div.container {
            background-color: lightsalmon;
            display: flex;
            flex-direction: row;
            
            
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            
        }
    </style>
</head>

<body>
    
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
        <div class="item">I</div>
    </div>
    <h2>flex-wrap: wrap;</h2>
    <img src="../../../img/create/flex-wrap01.png" alt="" style="background-size: cover; width: 600px; background-repeat: no-repeat; ">
    <h2>flex-wrap: wrap-reverse;</h2>
    <img src="../../../img/create/flex-wrap02.png" alt="" style="background-size: cover; width: 600px; background-repeat: no-repeat;">
</body>

</html>
