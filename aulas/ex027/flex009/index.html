<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div.container {
            background-color: lightsalmon;
            display: flex;
            flex-flow: row wrap;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 150px;
        }
    </style>
</head>

<body>
    
    <div class="container">
        <div class="item">AAA AAAA AAA AAAAA AAAAA AAAA</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">Felipe L. Melo</div>
        <div class="item">G</div>
        <div class="item">H</div>
        <div class="item">Iori B. Melo</div>
    </div>
</body>

</html>
