<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div.container {
            background-color: lightsalmon;
            display: flex;
            flex-flow: row wrap;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            padding: 20px;
            text-align: center;
        }

        div#i1 {
            order: 1;
        }

        div#i2 {
            order: 12;
        }

        div#i3 {
            order: 15;
        }

        div#i4 {
            order: -1;
        }

        div#i5 {
            order: 1123;
        }

        div#i6 {
            order: -121;
        }

        div#i8 {
            order: 0;
        }

        div#i7 {
            order: 0;
        }



        div#i9 {
            order: -1111;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
        <div class="item" id="i8">H</div>
        <div class="item" id="i9">I</div>
    </div>
</body>

</html>
