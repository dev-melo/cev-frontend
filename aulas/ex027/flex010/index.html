<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div.container {
            background-color: lightsalmon;
            display: flex;
            flex-flow: row nowrap;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 250px;
            flex-shrink: 1;
            flex-grow: 0;
        }

        div#F {
            flex-basis: 50px;
            flex-grow: 0;
            flex-shrink: 1;
        }

        div#G {
            flex-basis: 50px;
            flex-grow: 2;
            flex-shrink: 0;
        }

        div#I {
            flex-basis: 50px;
            flex-grow: 1;
            flex-shrink: 2;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item" id="F">FFFFFFFFFFF</div>
        <div class="item" id="G">GGGGGGGGGGG</div>
        <div class="item" id="I">IIIIIIIIIII</div>
    </div>
</body>

</html>
