<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output</title>

</head>

<body>
    <h1>Output</h1>
    <form>
        <p>
            <label for="inum">Número: </label>
            <input type="range" name="num" id="inum" min="1" max="22" oninput="res.innerHTML = Number(inum.value)">
        <p>
            <output id="res">0</output>
        </p>
        </p>

        <p>
            <input type="submit" value="Send">
            <input type="reset" value="Clear">
        </p>
    </form>

</body>

</html>
