<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>teste de form</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iUser">User: </label>
            <input type="text" name="user" id="iUser" required minlength="5" maxlength="15" size="20"
                placeholder="Username" autocomplete="username">
        </p>
        <p>
            <label for="iPass">Pass: </label>
            <input type="password" name="pass" id="iPass" required minlength="8" size="20" placeholder="Password" autocomplete="current-password">
        </p>
        <p>
            <input type="submit" value="Entrar">
        </p>

    </form>
</body>

</html>
