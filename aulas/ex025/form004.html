<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Formulario</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>

</head>

<body>
    <h1>Meu Primeiro Formulario</h1>
    <form autocomplete="off" action="cadastro.php" method="post">

        <fieldset>
            <legend>Dados Pessoas</legend>
            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome">
            </p>
            <p>
                <label for="iemail">Email</label>
                <input type="email" name="email" id="iemail" required>
            </p>
            <p>
                <label for="tel">Telefone</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" required pattern="^\d{2}\d{5}\d{4}$">
            </p>
        </fieldset>
        <!-- Estudar mais sobre RegEX 
         
        Patterns
        -->

        <p>
            <fieldset>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </fieldset>
        </p>
    </form>


</body>

</html>
