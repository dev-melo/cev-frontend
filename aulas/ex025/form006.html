<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="form007.html">
</head>

<body>
    <h1>Color Range File</h1>
    <form action="cadastro.php" method="get">
        <fieldset>
            <legend>Tipos de Inputs</legend>
            <label for="icor">Cores: </label><input type="color" name="cor" id="icor"> <br>
            <label for="irang">Range: </label> <input type="range" name="rang" id="irang" value="2" min="1" max="10">
            <br>
            <label for="ifil">Arquivo: </label> <input type="file" name="fil" id="ifil">

        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>


    </form>
</body>

</html>
