<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <h1>Teste de Forms</h1>
    <form action="cadastro.php" method="get">
        <p><label for="inome">Nome</label>
            <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome Completo"
                autocomplete="name">
        </p>
        <p>
            <label for="imedia">Média</label>
            <input type="number" name="media" id="imedia" required placeholder="0 a 10" min="0" max="10" step="0.5"
                value="5">
        </p>
        <p>
            <label for="imes">Período Letivo</label>
            <input type="month" name="mes" id="imes" value="2026-02">
        </p>
        <p>
            <label for="idia">Dia da Prova</label>
            <input type="date" name="dia" id="idia" value="2020-09-20">
        </p>
        <p>
            <label for="btn"></label>
            <input type="button" value="GO">
        </p>
        <p>
            <label for="isex">Sexo</label>
            <input type="radio" name="sex" id="isex" checked> M
            <input type="radio" name="sex" id="isex"> F
        </p>
        <p>
            <label for="ihora">Hora</label>
            <input type="time" name="hora" id="ihora" value="06:18">
        </p>

        <p>
            <label for="itel">Telefone</label>
            <input type="tel" name="tel" id="itel">
        </p>
        <p>
            <label for="iemail">Email</label>
            <input type="email" name="email" id="iemail">
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>



    </form>
</body>

</html>
