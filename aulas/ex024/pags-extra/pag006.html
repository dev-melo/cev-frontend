<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe com JS</title>
    <style>
        body{
            background-color: aquamarine;
        }
    </style>
</head>

<body>
    <a href="#" onclick="clicou()">Clique em Mim</a>
    <div id="sair"></div>
    <script>
        function clicou() {
            document.getElementById('sair').innerHTML += "<p>Clicou</p>"

        }
    </script>
</body>

</html>
