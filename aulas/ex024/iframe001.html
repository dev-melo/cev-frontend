<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução iFrame</title>

    <style>

        iframe{
            width: 500px;
            height: 500px;
            border: 1px dashed burlywood;
        }
    </style>
</head>

<body>
    <h1>Testando um uso de um iframe</h1>
    <p>Acessando o site do 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" scrolling="no">
            <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a>
        </iframe> 
    para aprender a programar.</p>

    <p>O site do <iframe src="https://www.glo.com" frameborder="0"></iframe> tambem é muito legal. Pena que não funciona me iframe</p>

    <p>
        O repositorio do Guanabara é legal.
        <iframe src="https://gustavoguanabara.github.io/" frameborder="0" height="500px" width="500px"></iframe>
        Olha ai.
    </p>


</body>

</html>
